<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Education Partnership Leads</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #dde3ec;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --warn: #b45309;
      --good: #15803d;
      --shadow: 0 1px 2px rgba(16, 24, 40, .08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
    .app { height: 100vh; display: grid; grid-template-columns: 360px 1fr; overflow: hidden; }
    aside { border-right: 1px solid var(--line); background: #fff; height: 100vh; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 18px 18px 12px; border-bottom: 1px solid var(--line); }
    h1 { margin: 0 0 6px; font-size: 20px; line-height: 1.2; letter-spacing: 0; }
    .sub { color: var(--muted); font-size: 13px; }
    .toolbar { padding: 12px 14px; display: grid; gap: 10px; border-bottom: 1px solid var(--line); }
    input, select, textarea { width: 100%; border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 7px; padding: 9px 10px; font: inherit; min-width: 0; }
    textarea { min-height: 82px; resize: vertical; }
    .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .filters .wide { grid-column: 1 / -1; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric { border: 1px solid var(--line); border-radius: 7px; padding: 8px; background: #fbfcfe; }
    .metric b { display: block; font-size: 16px; }
    .metric span { color: var(--muted); font-size: 11px; }
    .lead-list { flex: 1; min-height: 0; overflow: auto; padding: 8px; overscroll-behavior: contain; }
    .lead-row { width: 100%; text-align: left; border: 1px solid transparent; background: transparent; border-radius: 7px; padding: 10px; cursor: pointer; display: grid; gap: 5px; color: inherit; }
    .lead-row:hover { background: #f1f5f9; }
    .lead-row.active { background: #e9f7f5; border-color: #9bd4ce; }
    .lead-title { font-weight: 700; font-size: 13px; line-height: 1.3; }
    .lead-meta { color: var(--muted); font-size: 12px; display: flex; gap: 7px; flex-wrap: wrap; }
    .badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { border: 1px solid var(--line); border-radius: 999px; padding: 2px 7px; font-size: 11px; color: var(--muted); background: #fff; }
    .badge.good { color: var(--good); border-color: #bbf7d0; background: #f0fdf4; }
    .badge.warn { color: var(--warn); border-color: #fed7aa; background: #fff7ed; }
    .badge.keep { color: #065f46; border-color: #99f6e4; background: #ecfdf5; }
    .badge.review { color: #854d0e; border-color: #fde68a; background: #fffbeb; }
    .badge.remove { color: #991b1b; border-color: #fecaca; background: #fef2f2; }
    main { min-width: 0; height: 100vh; overflow: auto; }
    .detail { max-width: 1180px; margin: 0 auto; padding: 22px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 14px; }
    h2 { margin: 0 0 7px; font-size: 26px; line-height: 1.15; letter-spacing: 0; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    a.btn, button.btn { border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 7px; padding: 8px 10px; text-decoration: none; font-size: 13px; cursor: pointer; box-shadow: var(--shadow); }
    button.btn.primary, a.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(300px, .8fr); gap: 14px; }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    section h3 { margin: 0; padding: 13px 14px; border-bottom: 1px solid var(--line); font-size: 14px; }
    .grid { display: grid; grid-template-columns: 150px 1fr; gap: 0; }
    .field { display: contents; }
    .field label { padding: 11px 14px; color: var(--muted); font-size: 12px; border-bottom: 1px solid var(--line); }
    .field div { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--line); min-width: 0; overflow-wrap: anywhere; }
    .field:last-child label, .field:last-child div { border-bottom: 0; }
    .link { color: var(--accent-2); text-decoration: none; }
    .link:hover { text-decoration: underline; }
    .checklist { padding: 12px 14px; display: grid; gap: 10px; }
    .check { display: grid; grid-template-columns: 18px 1fr; gap: 9px; align-items: start; font-size: 13px; }
    .check input { width: 16px; height: 16px; margin-top: 1px; }
    .notes-box { padding: 12px 14px; display: grid; gap: 10px; }
    .empty { padding: 50px; text-align: center; color: var(--muted); }
    .status-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 14px; }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; grid-template-columns: 1fr; overflow: visible; }
      aside { height: 55vh; min-height: 420px; max-height: 55vh; }
      main { height: auto; overflow: visible; }
      .layout { grid-template-columns: 1fr; }
      .topbar { display: grid; }
      .actions { justify-content: flex-start; }
      .grid { grid-template-columns: 1fr; }
      .field label { border-bottom: 0; padding-bottom: 3px; }
      .field div { padding-top: 0; }
    }
  </style>
</head>

      if (!url) return '<span class="sub">Blank</span>';
      const first = url.split(';')[0].trim();
      return `<a class="link" href="${first}" target="_blank" rel="noreferrer">${label || first}</a>`;
    }
    function allLinks(value) {
      return safe(value).split(';').map(s => s.trim()).filter(Boolean).map(u => `<a class="link" href="${u}" target="_blank" rel="noreferrer">${u}</a>`).join('<br>') || '<span class="sub">Blank</span>';
    }
    function statusOf(i) { return localStorage.getItem(storeKey(i, 'status')) || 'new'; }
    function statusLabel(value) {
      return ({ new: 'New', research: 'Researching', contacted: 'Contacted', followup: 'Follow-up', partner: 'Partner fit', reject: 'Not fit' })[value] || value;
    }
    function progressOf(i) { return CHECKS.filter((_, c) => localStorage.getItem(storeKey(i, `check:${c}`)) === '1').length; }
    function filtered() {
      const q = state.query.toLowerCase();
      return LEADS.map((lead, i) => ({ lead, i })).filter(({ lead, i }) => {
        const hay = Object.values(lead).join(' ').toLowerCase();
        if (q && !hay.includes(q)) return false;
        if (state.status !== 'all' && statusOf(i) !== state.status) return false;
        if (state.quality === 'decision' && !safe(lead.decision_maker_name)) return false;
        if (state.quality === 'linkedin' && !safe(lead.linkedin_company_url + lead.linkedin_person_url)) return false;
        if (state.quality === 'email' && !safe(lead.email + lead.decision_maker_email)) return false;
        if (state.quality === 'phone' && !safe(lead.phone + lead.decision_maker_phone)) return false;
        if (state.fit !== 'all' && lead.quality_recommendation !== state.fit) return false;
        return true;
      });
    }
    function renderList() {
      const rows = filtered();
      if (!rows.some(({ i }) => i === state.selected)) {
        state.selected = rows.length ? rows[0].i : -1;
      }
      $('shownCount').textContent = rows.length;
      $('doneCount').textContent = LEADS.reduce((n, _, i) => n + (progressOf(i) === CHECKS.length ? 1 : 0), 0);
      $('dmCount').textContent = LEADS.filter(l => safe(l.decision_maker_name)).length;
      $('leadList').innerHTML = rows.map(({ lead, i }) => {
        const badges = [
          safe(lead.email) ? '<span class="badge good">email</span>' : '',
          safe(lead.phone) ? '<span class="badge good">phone</span>' : '',
          safe(lead.decision_maker_name) ? '<span class="badge good">verified DM</span>' : '<span class="badge warn">no DM</span>',
          safe(lead.linkedin_company_url + lead.linkedin_person_url) ? '<span class="badge good">LinkedIn</span>' : '',
          lead.quality_recommendation ? `<span class="badge ${lead.quality_recommendation.toLowerCase()}">${lead.quality_recommendation}</span>` : ''
        ].join('');
        return `<button class="lead-row ${i === state.selected ? 'active' : ''}" onclick="selectLead(${i})">
          <div class="lead-title">${lead.business_name}</div>
          <div class="lead-meta"><span>${lead.city || 'No city'}</span><span>${lead.country || ''}</span><span>score ${lead.score || 0}</span><span>${statusLabel(statusOf(i))}</span><span>${progressOf(i)}/${CHECKS.length}</span></div>
          <div class="badges">${badges}</div>
        </button>`;
      }).join('') || '<div class="empty">No leads match these filters.</div>';
    }
    function field(label, html) { return `<div class="field"><label>${label}</label><div>${html || '<span class="sub">Blank</span>'}</div></div>`; }
    function renderDetail() {
      const lead = LEADS[state.selected];
      if (!lead) { $('detail').innerHTML = '<div class="empty">Select a lead.</div>'; return; }
      const status = statusOf(state.selected);
      const checks = CHECKS.map((text, c) => {
        const checked = localStorage.getItem(storeKey(state.selected, `check:${c}`)) === '1';
        return `<label class="check"><input type="checkbox" ${checked ? 'checked' : ''} onchange="setCheck(${state.selected}, ${c}, this.checked)"><span>${text}</span></label>`;
      }).join('');
      $('detail').innerHTML = `<div class="topbar">
        <div><h2>${lead.business_name}</h2><div class="sub">${lead.city || ''} ${lead.country || ''} · score ${lead.score || 0} · ${lead.quality_recommendation || 'Unaudited'} · ${lead.decision_confidence || 'no verified decision maker'}</div></div>
        <div class="actions">
          ${lead.website ? `<a class="btn primary" href="${lead.website}" target="_blank" rel="noreferrer">Website</a>` : ''}
          ${lead.google_maps_url ? `<a class="btn" href="${lead.google_maps_url}" target="_blank" rel="noreferrer">Maps</a>` : ''}
          ${lead.linkedin_company_url ? `<a class="btn" href="${lead.linkedin_company_url.split(';')[0].trim()}" target="_blank" rel="noreferrer">LinkedIn</a>` : ''}
          ${lead.email ? `<a class="btn" href="mailto:${lead.email.split(';')[0].trim()}">Email</a>` : ''}
        </div>
      </div>
      <div class="layout">
        <section><h3>Lead Profile</h3><div class="grid">
          ${field('Website', linkify(lead.website, displayUrl(lead.website)))}
          ${field('Email', safe(lead.email))}
          ${field('Phone', safe(lead.phone))}
          ${field('Instagram', allLinks(lead.instagram))}
          ${field('Company LinkedIn', allLinks(lead.linkedin_company_url))}
          ${field('Person LinkedIn', allLinks(lead.linkedin_person_url))}
          ${field('Notes', safe(lead.notes))}
        </div></section>
        <div style="display:grid;gap:14px;align-content:start;">
          <section><h3>Quality Audit</h3><div class="grid">
            ${field('Recommendation', safe(lead.quality_recommendation))}
            ${field('Grade', safe(lead.quality_grade))}
            ${field('Market role', safe(lead.market_role))}
            ${field('Reason', safe(lead.quality_reason))}
          </div></section>
          <section><h3>Outreach Status</h3>
            <div class="status-row"><select onchange="setStatus(${state.selected}, this.value)">
              ${['new','research','contacted','followup','partner','reject'].map(s => `<option value="${s}" ${s === status ? 'selected' : ''}>${statusLabel(s)}</option>`).join('')}
            </select></div>
            <div class="checklist">${checks}</div>
          </section>
          <section><h3>Verified Decision Maker</h3><div class="grid">
            ${field('Name', safe(lead.decision_maker_name))}
            ${field('Title', safe(lead.decision_maker_title))}
            ${field('Email', safe(lead.decision_maker_email))}
            ${field('Phone route', safe(lead.decision_maker_phone))}
            ${field('Source', linkify(lead.decision_source_url, lead.decision_source_type || lead.decision_source_url))}
            ${field('Confidence', safe(lead.decision_confidence))}
          </div></section>
          <section><h3>Private Notes</h3><div class="notes-box"><textarea placeholder="Call notes, objections, follow-up date..." oninput="setNote(${state.selected}, this.value)">${localStorage.getItem(storeKey(state.selected, 'note')) || ''}</textarea></div></section>
        </div>
      </div>`;
    }
    function selectLead(i) { state.selected = i; renderList(); renderDetail(); }
    function setStatus(i, value) { localStorage.setItem(storeKey(i, 'status'), value); renderList(); renderDetail(); }
    function setCheck(i, c, checked) { localStorage.setItem(storeKey(i, `check:${c}`), checked ? '1' : '0'); renderList(); }
    function setNote(i, value) { localStorage.setItem(storeKey(i, 'note'), value); }
    $('search').addEventListener('input', e => { state.query = e.target.value; renderList(); renderDetail(); });
    $('statusFilter').addEventListener('change', e => { state.status = e.target.value; renderList(); renderDetail(); });
    $('qualityFilter').addEventListener('change', e => { state.quality = e.target.value; renderList(); renderDetail(); });
    $('fitFilter').addEventListener('change', e => { state.fit = e.target.value; renderList(); renderDetail(); });
    renderList(); renderDetail();
  </script>
</body>
</html>
